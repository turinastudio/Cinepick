name: Remote Deploy Check

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL publica del addon"
        required: true
        default: "https://autostream-http-production.up.railway.app"

jobs:
  remote-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run remote deploy check
        run: npm run test:remote -- "${{ inputs.base_url }}"
