services:
  - type: web
    name: stremio-web-scraper-addon
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: ADDON_URL
        value: https://stremio-web-scraper-addon.onrender.com
      - key: STREAM_SELECTION_MODE
        value: global
      - key: STREAM_MAX_RESULTS
        value: 2
      - key: SHOW_SUPPORT_STREAM
        value: true
      - key: SUPPORT_URL
        value: https://ko-fi.com/turinastudio
      - key: PROVIDER_TIMEOUT_MS
        value: 25000
      - key: PROVIDER_DEBUG_TIMEOUT_MS
        value: 40000
      - key: EXTRACTOR_TIMEOUT_MS
        value: 3500
      - key: EXTRACTOR_CANDIDATE_TIMEOUT_MS
        value: 5000
      - key: WEBSTREAM_HTTP_RETRIES
        value: 1
      - key: TMDB_API_KEY
        value: 439c478a771f35c05022f9feabcca01c
      - key: ENABLE_ANIME_ENGINE
        value: true
      - key: ANIME_ENGINE_DEBUG
        value: false
      - key: GNULA_BASE_URL
        value: https://gnula.life
      - key: CINECALIDAD_BASE_URL
        value: https://www.cinecalidad.vg
      - key: NETMIRROR_BASE_URL
        value: https://net22.cc
      - key: NETMIRROR_PLAY_URL
        value: https://net52.cc
      - key: CASTLE_BASE_URL
        value: https://api.fstcy.com
      - key: CUEVANA_BASE_URL
        value: https://ww1.cuevana3.is
      - key: HOMECINE_BASE_URL
        value: https://homecine.to
      - key: TIOPLUS_BASE_URL
        value: https://tioplus.app
      - key: MHDFLIX_BASE_URL
        value: https://ww1.mhdflix.com
      - key: MHDFLIX_API_URL
        value: https://core.mhdflix.com
      - key: LAMOVIE_BASE_URL
        value: https://la.movie
      - key: SERIESMETRO_BASE_URL
        value: https://www3.seriesmetro.net
      - key: VERSERIESONLINE_BASE_URL
        value: https://www.verseriesonline.net
      - key: CINEPLUS123_BASE_URL
        value: https://cineplus123.org
      - key: SERIESKAO_BASE_URL
        value: https://serieskao.top
      - key: ANIMEAV1_BASE_URL
        value: https://animeav1.com
      - key: ANIMEFLV_BASE_URL
        value: https://www3.animeflv.net
      - key: HENAOJARA_BASE_URL
        value: https://ww1.henaojara.net
      - key: LACARTOONS_BASE_URL
        value: https://www.lacartoons.com
