services:
  - type: web
    name: stremio-web-scraper-addon
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: STREAM_SELECTION_MODE
        value: global
      - key: STREAM_MAX_RESULTS
        value: 2
      - key: PROVIDER_TIMEOUT_MS
        value: 25000
      - key: PROVIDER_DEBUG_TIMEOUT_MS
        value: 40000
      - key: TMDB_API_KEY
        value: 439c478a771f35c05022f9feabcca01c
      - key: GNULA_BASE_URL
        value: https://gnula.life
      - key: CINECALIDAD_BASE_URL
        value: https://www.cinecalidad.vg
      - key: NETMIRROR_BASE_URL
        value: https://net22.cc
      - key: NETMIRROR_PLAY_URL
        value: https://net52.cc
      - key: CASTLE_BASE_URL
        value: https://api.fstcy.com
      - key: CUEVANA_BASE_URL
        value: https://ww1.cuevana3.is
      - key: HOMECINE_BASE_URL
        value: https://homecine.to
      - key: TIOPLUS_BASE_URL
        value: https://tioplus.app
      - key: VERHDLINK_BASE_URL
        value: https://verhdlink.com
      - key: CINEHDPLUS_BASE_URL
        value: https://cinehdplus.gratis
      - key: MHDFLIX_BASE_URL
        value: https://ww1.mhdflix.com
      - key: MHDFLIX_API_URL
        value: https://core.mhdflix.com
      - key: LAMOVIE_BASE_URL
