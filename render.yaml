services:
  - type: web
    name: cinepick
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: ADDON_URL
        value: https://cinepick.onrender.com
      - key: MANIFEST_DESCRIPTION
        value: Cinepick addon de Stremio con motor general y motor anime integrados.
      - key: DEFAULT_SELECTION_MODE
        value: global
      - key: DEFAULT_MAX_RESULTS
        value: 20
      - key: DEFAULT_INTERNAL_ONLY
        value: true
      - key: STREAM_SELECTION_MODE
        value: global
      - key: STREAM_MAX_RESULTS
        value: 20
      - key: ACTIVE_PROVIDERS
        value: ""
      - key: SHOW_SUPPORT_STREAM
        value: true
      - key: SUPPORT_URL
        value: https://ko-fi.com/turinastudio
      - key: PROVIDER_TIMEOUT_MS
        value: 25000
      - key: PROVIDER_DEBUG_TIMEOUT_MS
        value: 40000
      - key: PROVIDER_MAX_CONCURRENT
        value: 6
      - key: WEBSTREAM_HTTP_TIMEOUT_MS
        value: 25000
      - key: EXTRACTOR_TIMEOUT_MS
        value: 3500
      - key: EXTRACTOR_CANDIDATE_TIMEOUT_MS
        value: 5000
      - key: EXTRACTOR_RETRIES
        value: 1
      - key: WEBSTREAM_HTTP_RETRIES
        value: 1
      - key: CIRCUIT_BREAKER_FAILURES
        value: 5
      - key: CIRCUIT_BREAKER_COOLDOWN_MS
        value: 600000
      - key: SCRAPING_MIN_DELAY_MS
        value: 0
      - key: SCRAPING_MAX_DELAY_MS
        value: 0
      - key: ALLOW_UNSTABLE_HOSTS
        value: false
      - key: DISABLED_STREAM_SOURCES
        value: ""
      - key: TMDB_API_KEY
        value: 439c478a771f35c05022f9feabcca01c
      - key: ENABLE_ANIME_ENGINE
        value: true
      - key: ANIME_ENGINE_DEBUG
        value: false
      - key: GNULA_BASE_URL
        value: https://gnula.life
      - key: EMBED69_BASE_URL
        value: https://embed69.org
      - key: CINECALIDAD_BASE_URL
        value: https://www.cinecalidad.vg
      - key: NETMIRROR_BASE_URL
        value: https://net22.cc
      - key: NETMIRROR_PLAY_URL
        value: https://net52.cc
      - key: CASTLE_BASE_URL
        value: https://api.fstcy.com
      - key: CASTLE_DECRYPT_URL
        value: https://decryptor.fstcy.com/decrypt
      - key: CUEVANA_BASE_URL
        value: https://ww1.cuevana3.is
      - key: HOMECINE_BASE_URL
        value: https://homecine.to
      - key: TIOPLUS_BASE_URL
        value: https://tioplus.app
      - key: TIOANIME_BASE_URL
        value: https://tioanime.com
      - key: MHDFLIX_BASE_URL
        value: https://ww1.mhdflix.com
      - key: MHDFLIX_API_URL
        value: https://core.mhdflix.com
      - key: LAMOVIE_BASE_URL
        value: https://la.movie
      - key: SERIESMETRO_BASE_URL
        value: https://www3.seriesmetro.net
      - key: VERSERIESONLINE_BASE_URL
