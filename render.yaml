services:
  - type: web
    name: stremio-web-scraper-addon
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: STREAM_SELECTION_MODE
        value: global
      - key: STREAM_MAX_RESULTS
        value: 1
      - key: GNULA_BASE_URL
        value: https://gnula.life
      - key: CINECALIDAD_BASE_URL
        value: https://www.cinecalidad.ec
      - key: MHDFLIX_BASE_URL
        value: https://ww1.mhdflix.com
      - key: MHDFLIX_API_URL
        value: https://core.mhdflix.com
      - key: VERSERIESONLINE_BASE_URL
        value: https://www.verseriesonline.net
      - key: ADDON_URL
        value: https://stremio-web-scraper-addon.onrender.com
